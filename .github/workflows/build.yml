name: Build and validate

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    name: Build (Release|x64)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      # ── Locate MSBuild ───────────────────────────────────────────────────────
      #
      # Use vswhere so the path is stable across VS editions and minor bumps.
      #
      - name: Locate MSBuild
        id: msbuild
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild `
            -find "MSBuild\**\Bin\MSBuild.exe" |
            Select-Object -First 1
          "path=$vs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        shell: pwsh

      # ── Install WDK via NuGet ────────────────────────────────────────────────
      #
      # The WDK MSI installer is not reliable in CI (large, GUI prompts, fragile
      # redirect URLs).  Microsoft ships the km headers and libs as NuGet packages
      # specifically for CI use.  Three packages are needed:
      #
      #   Microsoft.Windows.SDK.CPP       shared/ headers (sdkddkver.h, …)
      #   Microsoft.Windows.SDK.CPP.x64   x64 SDK headers + libs
      #   Microsoft.Windows.WDK.x64       km/ headers + ntoskrnl.lib, hal.lib, …
      #
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: packages
          key: nuget-wdk-${{ hashFiles('packages.config') }}

      - name: Restore NuGet packages
        run: nuget restore packages.config -PackagesDirectory packages
        shell: pwsh

      # ── Resolve package paths ────────────────────────────────────────────────
      #
      # NuGet packages place content under a c\ subdirectory:
      #   Microsoft.Windows.WDK.x64\c\Include\10.0.26100.0\km\
      #   Microsoft.Windows.WDK.x64\c\Lib\10.0.26100.0\km\x64\
      #   Microsoft.Windows.SDK.CPP\c\Include\10.0.26100.0\shared\
      #
      - name: Resolve WDK paths
        id: wdk
        run: |
          $wdk = (Get-ChildItem packages -Filter "Microsoft.Windows.WDK.x64.*" -Directory).FullName
          $shr = (Get-ChildItem packages -Filter "Microsoft.Windows.SDK.CPP.*" -Directory |
                  Where-Object { $_.Name -notmatch "\.x64\.|\.arm\.|\.x86\." }).FullName

          $ver = (Get-ChildItem "$wdk\c\Include" -Directory | Select-Object -First 1).Name

          "km_include=$wdk\c\Include\$ver\km"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "shared_include=$shr\c\Include\$ver\shared" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "km_lib=$wdk\c\Lib\$ver\km\x64"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "WDK version : $ver"
          Write-Host "KM include  : $wdk\c\Include\$ver\km"
          Write-Host "Shared inc  : $shr\c\Include\$ver\shared"
          Write-Host "KM lib      : $wdk\c\Lib\$ver\km\x64"
        shell: pwsh

      # ── Build driver ─────────────────────────────────────────────────────────
      #
      # Override the three path properties so the build works without the WDK
      # being installed system-wide under C:\Program Files (x86)\Windows Kits\.
      #
      - name: Build sentinel.sys
        run: |
          & "${{ steps.msbuild.outputs.path }}" `
            driver\sentinel.vcxproj `
            /p:Configuration=Release /p:Platform=x64 `
            "/p:KMInclude=${{ steps.wdk.outputs.km_include }}" `
            "/p:SharedInclude=${{ steps.wdk.outputs.shared_include }}" `
            "/p:KMLib=${{ steps.wdk.outputs.km_lib }}" `
            /m /nologo
        shell: pwsh

      # ── Build client ─────────────────────────────────────────────────────────
      - name: Build sentinel-client.exe
        run: |
          & "${{ steps.msbuild.outputs.path }}" `
            client\client.vcxproj `
            /p:Configuration=Release /p:Platform=x64 `
            /m /nologo
        shell: pwsh

      # ── Validate PE characteristics ──────────────────────────────────────────
      #
      # Checks that the linker set the flags required for the driver to load:
      #
      #   FORCE_INTEGRITY   required by ObRegisterCallbacks and
      #                     PsSetCreateProcessNotifyRoutineEx; without it the
      #                     kernel refuses to register the callbacks.
      #
      #   Subsystem Native  confirms the file is a kernel-mode binary, not a
      #                     user-mode DLL accidentally built as one.
      #
      #   Entry point       must resolve to DriverEntry; a wrong entry point
      #                     causes an immediate bugcheck on driver load.
      #
      - name: Validate sentinel.sys PE headers
        run: |
          $vsRoot = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild -property installationPath
          $dumpbin = Get-ChildItem "$vsRoot\VC\Tools\MSVC" `
            -Recurse -Filter "dumpbin.exe" |
            Where-Object { $_.FullName -match "HostX64\\x64" } |
            Select-Object -First 1 |
            Select-Object -ExpandProperty FullName

          $headers = & $dumpbin /headers driver\bin\x64\Release\sentinel.sys 2>&1 | Out-String

          Write-Host "=== dumpbin /headers output ==="
          Write-Host $headers
          Write-Host "================================"

          $errors = @()

          if ($headers -notmatch "FORCE_INTEGRITY") {
            $errors += "FORCE_INTEGRITY not set — ObRegisterCallbacks will be refused at runtime"
          }
          if ($headers -notmatch "(?i)native") {
            $errors += "Subsystem is not NATIVE — binary was not linked as a kernel driver"
          }
          if ($headers -notmatch "DriverEntry") {
            $errors += "Entry point symbol 'DriverEntry' not found"
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

          Write-Host "PE validation passed"
        shell: pwsh

      # ── Upload artefacts ─────────────────────────────────────────────────────
      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-x64-release
          path: |
            driver/bin/x64/Release/sentinel.sys
            driver/bin/x64/Release/sentinel.pdb
            client/bin/x64/Release/sentinel-client.exe
          if-no-files-found: error
